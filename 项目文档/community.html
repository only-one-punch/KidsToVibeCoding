<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品社区 - CodeBuddyAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral: #FF6B6B;
      --coral-muted: rgba(255, 107, 107, 0.1);
      --teal: #2DD4BF;
      --teal-muted: rgba(45, 212, 191, 0.1);
      --gold: #FBBF24;
      --gold-muted: rgba(251, 191, 36, 0.1);
      --ink: #1F2937;
      --slate: #6B7280;
      --muted: #9CA3AF;
      --cream: #FFFBF7;
      --cream-dark: #FEF3E8;
      --white: #FFFFFF;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 9999px;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Outfit", "Noto Sans SC", system-ui, sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    .top-bar {
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .page-title {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
    }

    .filter-tab {
      padding: 8px 16px;
      border-radius: var(--radius-full);
      background: var(--cream-dark);
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--slate);
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      font-family: inherit;
    }

    .filter-tab:hover { background: var(--coral-muted); color: var(--coral); }
    .filter-tab.active { background: var(--coral); color: white; }

    .main {
      padding: 28px 24px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .work-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all 0.3s var(--ease-out);
      cursor: pointer;
    }

    .work-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }

    .work-preview {
      aspect-ratio: 4/3;
      background: linear-gradient(145deg, var(--cream-dark), var(--cream));
      display: grid;
      place-items: center;
      font-size: 48px;
      position: relative;
    }

    .work-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      font-size: 11px;
      font-weight: 600;
      color: var(--coral);
    }

    .work-info {
      padding: 16px;
    }

    .work-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .work-author {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .author-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--coral-muted);
      display: grid;
      place-items: center;
      font-size: 10px;
    }

    .work-stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--slate);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat.liked { color: var(--coral); }

    .load-more {
      text-align: center;
      margin-top: 32px;
    }

    .load-btn {
      padding: 14px 32px;
      border-radius: var(--radius-full);
      background: var(--white);
      border: 2px solid rgba(0, 0, 0, 0.06);
      font-size: 15px;
      font-weight: 600;
      color: var(--slate);
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
      font-family: inherit;
    }

    .load-btn:hover {
      border-color: var(--coral);
      color: var(--coral);
    }

    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      padding: 12px 24px;
      display: flex;
      justify-content: space-around;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      transition: all 0.2s var(--ease-out);
      padding: 8px 16px;
      border-radius: var(--radius-md);
    }

    .nav-item:hover { color: var(--slate); }
    .nav-item.active { color: var(--coral); }
    .nav-item .icon { font-size: 22px; }

    @media (max-width: 800px) {
      .works-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 500px) {
      .top-bar { flex-direction: column; gap: 12px; padding: 12px 16px; }
      .main { padding: 20px 16px 100px; }
      .works-grid { grid-template-columns: 1fr; gap: 16px; }
      .filter-tabs { width: 100%; overflow-x: auto; }
    }
  </style>
</head>
