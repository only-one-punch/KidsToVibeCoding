<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeBuddyAI - 让孩子学会用 AI 创造</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral: #FF6B6B;
      --coral-light: #FF8E8E;
      --coral-dark: #E85555;
      --coral-muted: rgba(255, 107, 107, 0.12);
      --teal: #2DD4BF;
      --teal-light: #5EEAD4;
      --teal-dark: #14B8A6;
      --teal-muted: rgba(45, 212, 191, 0.12);
      --gold: #FBBF24;
      --gold-muted: rgba(251, 191, 36, 0.12);
      --ink: #1F2937;
      --ink-light: #374151;
      --slate: #6B7280;
      --muted: #9CA3AF;
      --cream: #FFFBF7;
      --cream-dark: #FEF3E8;
      --white: #FFFFFF;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-full: 9999px;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-expo: cubic-bezier(0.05, 0.9, 0.1, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: "Outfit", "Noto Sans SC", system-ui, sans-serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ===== 导航栏 ===== */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 251, 247, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 107, 107, 0.08);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
      color: var(--ink);
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(145deg, var(--coral), var(--coral-light));
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 22px;
      transform: rotate(-6deg);
      box-shadow: 0 8px 20px rgba(255, 107, 107, 0.25);
    }

    .nav-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: var(--radius-full);
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.25s var(--ease-out);
      font-family: inherit;
    }

    .btn-ghost {
      background: transparent;
      color: var(--slate);
    }

    .btn-ghost:hover {
      background: var(--cream-dark);
      color: var(--ink);
    }

    .btn-primary {
      background: var(--ink);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(31, 41, 55, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.25);
    }

    .btn-coral {
      background: var(--coral);
      color: white;
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.35);
    }

    .btn-coral:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(255, 107, 107, 0.45);
    }

    /* ===== Hero 区域 ===== */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      text-align: center;
      position: relative;
    }

    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.6;
      pointer-events: none;
    }

    .hero-glow-1 {
      top: -200px;
      right: -100px;
      background: radial-gradient(circle, rgba(255, 107, 107, 0.25), transparent 70%);
    }

    .hero-glow-2 {
      bottom: -200px;
      left: -100px;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.2), transparent 70%);
    }

    .hero-title {
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
      max-width: 700px;
    }

    .hero-title .accent {
      color: var(--coral);
      position: relative;
    }

    .hero-title .accent::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      height: 10px;
      background: var(--coral-muted);
      border-radius: 4px;
      z-index: -1;
    }

    .hero-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 40px 48px;
      margin-top: 32px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.06);
      max-width: 480px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: linear-gradient(135deg, var(--coral-muted), var(--teal-muted));
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 600;
      color: var(--coral-dark);
      margin-bottom: 16px;
    }

    .hero-subtitle {
      font-size: 17px;
      color: var(--slate);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-large {
      padding: 14px 28px;
      font-size: 16px;
    }

    .btn-outline {
      background: transparent;
      color: var(--ink);
      border: 2px solid rgba(0, 0, 0, 0.08);
    }

    .btn-outline:hover {
      border-color: var(--coral);
      color: var(--coral);
      background: var(--coral-muted);
    }

    /* ===== 功能入口 ===== */
    .features {
      padding: 48px 24px 80px;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .feature-item {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      border: 1px solid rgba(0, 0, 0, 0.04);
      text-decoration: none;
      display: block;
    }

    .feature-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
      border-color: transparent;
    }

    .feature-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 30px;
      margin: 0 auto 14px;
    }

    .feature-icon.coral { background: var(--coral-muted); }
    .feature-icon.teal { background: var(--teal-muted); }
    .feature-icon.gold { background: var(--gold-muted); }
    .feature-icon.purple { background: rgba(139, 92, 246, 0.1); }

    .feature-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .feature-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .feature-link {
      font-size: 13px;
      font-weight: 600;
      color: var(--coral);
    }

    /* ===== 统计 ===== */
    .stats-bar {
      text-align: center;
      padding: 24px;
      color: var(--slate);
      font-size: 15px;
    }

    .stats-bar strong {
      color: var(--coral);
      font-weight: 700;
    }

    /* ===== Footer ===== */
    footer {
      padding: 32px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid rgba(0, 0, 0, 0.04);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 900px) {
      .feature-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      nav { padding: 12px 16px; }
      .nav-actions .btn-ghost { display: none; }
      .hero { padding: 80px 16px 40px; }
      .hero-card { padding: 28px 24px; }
      .features { padding: 32px 16px 60px; }
      .feature-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .feature-item { padding: 20px 12px; }
      .hero-actions { flex-direction: column; }
      .hero-actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon">🚀</div>
      <span>CodeBuddyAI</span>
    </a>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-ghost">登录</a>
      <a href="register.html" class="btn btn-primary">注册</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-glow hero-glow-1"></div>
    <div class="hero-glow hero-glow-2"></div>

    <h1 class="hero-title">
      让孩子学会用 <span class="accent">AI</span> 创造
    </h1>

    <div class="hero-card">
      <div class="hero-badge">🎮 AI 工具版多邻国</div>
      <p class="hero-subtitle">
        6-14岁孩子的AI学习平台<br>
        0 编程基础，用 AI 创造真实作品
      </p>
      <div class="hero-actions">
        <a href="learning-path.html" class="btn btn-coral btn-large">开始学习</a>
        <a href="#features" class="btn btn-outline btn-large">了解更多</a>
      </div>
    </div>

    <section class="features" id="features">
      <div class="feature-grid">
        <a href="learning-path.html" class="feature-item">
          <div class="feature-icon coral">🎨</div>
          <div class="feature-title">设计</div>
          <div class="feature-sub">Figma 可视化</div>
          <span class="feature-link">入门 →</span>
        </a>
        <a href="ai-chat.html" class="feature-item">
          <div class="feature-icon teal">🤖</div>
          <div class="feature-title">AI 助手</div>
          <div class="feature-sub">Claude 对话</div>
          <span class="feature-link">使用 →</span>
        </a>
        <a href="workspace.html" class="feature-item">
          <div class="feature-icon gold">💻</div>
          <div class="feature-title">编程</div>

        <a href="community.html" class="feature-item">
          <div class="feature-icon purple">🚀</div>
          <div class="feature-title">部署</div>
          <div class="feature-sub">发布作品</div>
          <span class="feature-link">作品 →</span>
        </a>
      </div>
    </section>

    <div class="stats-bar">
      已有 <strong>1,234</strong> 位小朋友在这里学习
    </div>
  </section>

  <footer>
    <p>© 2026 CodeBuddyAI · 让每个孩子都能用 AI 创造</p>
  </footer>
</body>
</html>
