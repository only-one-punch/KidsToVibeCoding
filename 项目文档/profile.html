<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - CodeBuddyAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral: #FF6B6B;
      --coral-muted: rgba(255, 107, 107, 0.1);
      --teal: #2DD4BF;
      --teal-muted: rgba(45, 212, 191, 0.1);
      --gold: #FBBF24;
      --gold-muted: rgba(251, 191, 36, 0.1);
      --purple: #8B5CF6;
      --purple-muted: rgba(139, 92, 246, 0.1);
      --ink: #1F2937;
      --slate: #6B7280;
      --muted: #9CA3AF;
      --cream: #FFFBF7;
      --cream-dark: #FEF3E8;
      --white: #FFFFFF;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-full: 9999px;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Outfit", "Noto Sans SC", system-ui, sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    .top-bar {
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .page-title {
      font-size: 20px;
      font-weight: 700;
    }

    .top-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--cream-dark);
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 18px;
      transition: all 0.2s var(--ease-out);
    }

    .action-btn:hover { background: var(--coral-muted); }

    .main {
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: 100px;
    }

    .profile-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--coral), var(--teal));
      display: grid;
      place-items: center;
      font-size: 32px;
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .profile-level {
      font-size: 14px;
      color: var(--coral);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .profile-stats {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(0, 0, 0, 0.04);
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--ink);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .section {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 24px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-item {
      margin-bottom: 20px;
    }

    .progress-item:last-child { margin-bottom: 0; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 15px;
      font-weight: 600;
    }

    .progress-percent {
      font-size: 14px;
      color: var(--coral);
      font-weight: 600;
    }

    .progress-bar {
      height: 8px;
      background: var(--cream-dark);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--coral), var(--teal));
      border-radius: var(--radius-full);
      transition: width 0.5s var(--ease-out);
    }

    .progress-current {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .badges-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .badge-item {
      text-align: center;
      padding: 14px 8px;
      border-radius: var(--radius-md);
      background: var(--cream);
      transition: all 0.2s var(--ease-out);
    }

    .badge-item:hover { transform: translateY(-2px); }
    .badge-item.locked { opacity: 0.4; filter: grayscale(1); }

    .badge-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .badge-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--slate);
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .work-item {
      aspect-ratio: 1;
      background: var(--cream);
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      position: relative;
    }

    .work-item:hover { transform: scale(1.05); }

    .work-actions {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s var(--ease-out);
    }

    .work-item:hover .work-actions { opacity: 1; }

    .work-action-btn {
      flex: 1;
      padding: 6px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.9);
      border: none;
      font-size: 11px;
      font-weight: 600;
      color: var(--slate);
      cursor: pointer;
    }

    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      padding: 12px 24px;
      display: flex;
      justify-content: space-around;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      transition: all 0.2s var(--ease-out);
      padding: 8px 16px;
      border-radius: var(--radius-md);
    }

    .nav-item:hover { color: var(--slate); }
    .nav-item.active { color: var(--coral); }
    .nav-item .icon { font-size: 22px; }

    @media (max-width: 500px) {
      .main { padding: 16px; }
      .badges-grid { grid-template-columns: repeat(3, 1fr); }
      .works-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="page-title">👤 个人中心</div>
    <div class="top-actions">
      <button class="action-btn">⚙️</button>
      <button class="action-btn">🔔</button>
    </div>
  </div>

  <main class="main">
    <div class="profile-card">
      <div class="profile-avatar">👦</div>
      <div class="profile-info">
        <div class="profile-name">小明 (10岁)</div>
        <div class="profile-level">⭐ Level 5 - 初级创作者</div>
        <div class="profile-stats">
          <div class="stat-item">
            <div class="stat-value">3</div>
            <div class="stat-label">作品</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">256</div>
            <div class="stat-label">获赞</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">6</div>
            <div class="stat-label">徽章</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">7天</div>
            <div class="stat-label">连续</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📊 学习进度</div>
      <div class="progress-item">
        <div class="progress-header">
          <span class="progress-label">🌐 网站开发路径</span>
          <span class="progress-percent">65%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 65%"></div>
        </div>
        <div class="progress-current">当前: 第3课 - Figma 设计</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">🏆 成就徽章 (6/24)</div>
      <div class="badges-grid">
        <div class="badge-item">
          <div class="badge-icon">🎨</div>
          <div class="badge-name">设计初探</div>
        </div>
        <div class="badge-item">
          <div class="badge-icon">🚀</div>
          <div class="badge-name">第一周</div>
        </div>
        <div class="badge-item">
          <div class="badge-icon">⭐</div>
          <div class="badge-name">新星</div>
        </div>
        <div class="badge-item">
          <div class="badge-icon">🔥</div>
          <div class="badge-name">连续7天</div>
        </div>
        <div class="badge-item">
          <div class="badge-icon">💡</div>
          <div class="badge-name">好问者</div>
        </div>
        <div class="badge-item">
          <div class="badge-icon">📚</div>
          <div class="badge-name">好学</div>
        </div>
        <div class="badge-item locked">
          <div class="badge-icon">🎯</div>
          <div class="badge-name">专注</div>
        </div>
        <div class="badge-item locked">
          <div class="badge-icon">💎</div>
          <div class="badge-name">钻石</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📁 我的作品 (3)</div>
      <div class="works-grid">
        <div class="work-item">
          🌐
          <div class="work-actions">
            <button class="work-action-btn">查看</button>
            <button class="work-action-btn">编辑</button>
          </div>
        </div>
        <div class="work-item">
          🎂
          <div class="work-actions">
            <button class="work-action-btn">查看</button>
            <button class="work-action-btn">编辑</button>
          </div>
        </div>
        <div class="work-item">
          🧮
          <div class="work-actions">
            <button class="work-action-btn">查看</button>
            <button class="work-action-btn">编辑</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="nav-bar">
    <a href="index.html" class="nav-item">
      <span class="icon">🏠</span>
      <span>首页</span>
    </a>
    <a href="learning-path.html" class="nav-item">
      <span class="icon">📚</span>
      <span>学习</span>
    </a>
    <a href="workspace.html" class="nav-item">
      <span class="icon">➕</span>
      <span>创作</span>
    </a>
    <a href="community.html" class="nav-item">
      <span class="icon">🎨</span>
      <span>社区</span>
    </a>
    <a href="profile.html" class="nav-item active">
      <span class="icon">👤</span>
      <span>我的</span>
    </a>
  </nav>
</body>
</html>
